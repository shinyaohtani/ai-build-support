# XcodeGen base settings for macOS apps.
# Include this from each project's project.yml:
#
#   include:
#     - path: ai-build-support/xcodegen_base_macos.yml
#
# Override any value in the including file — dictionaries deep-merge
# (project file wins), arrays replace entirely.

options:
  bundleIdPrefix: com.aabce
  xcodeVersion: "2630"

settings:
  base:
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Asset symbol generation is not useful for macOS SwiftUI apps
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    DEVELOPMENT_TEAM: PNKEK75AK4
    # Required for Developer ID notarization
    ENABLE_HARDENED_RUNTIME: YES
